<!DOCTYPE html>
<html>
<head>
  <title>Armadillo Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top bar */
    .topbar {
      background: #222;
      color: white;
      padding: 10px;
    }

    .topbar button {
      margin-left: 10px;
    }

    /* Main layout */
    .container {
      display: flex;
      flex: 1;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      background: #333;
      color: white;
      padding: 10px;
    }

    .sidebar div {
      margin: 10px 0;
      cursor: pointer;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 10px;
      background: #f5f5f5;
    }

    /* Game row */
    .game {
      background: white;
      margin: 5px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .buttons button {
      margin-left: 5px;
    }
  </style>
</head>

  <!-- Top bar -->

</body>
</html>
